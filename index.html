<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#d3d8dd">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Calc">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<title>Calculator</title>
<style>
  :root{
    /* fx-115ES light silver theme */
    --case:#eef0f2; --case2:#c2c8ce; --case-edge:#a7aeb6;
    --lcd:#c9d0c1; --lcd-edge:#828d78; --lcd-ink:#1b1f19;
    --key-txt:#20242a;
    --grey:#727a86; --grey2:#5c636e; --grey-edge:#474d57;
    --blk:#23272d; --blk2:#14171b; --blk-edge:#050607;
    --red:#8f3b52; --red2:#783044; --red-edge:#5c2537;
    --shift:#d79a2b; --alpha:#d15a68; --func:#f4f6f8;
    --shadow:rgba(60,66,74,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--case2);
    color:var(--key-txt);
    display:flex;align-items:stretch;justify-content:center;
    height:100%;height:100dvh;overflow:hidden;
    overscroll-behavior:none;touch-action:manipulation;
  }
  .calc{
    position:relative;
    width:100%;max-width:560px;height:100%;
    background:linear-gradient(165deg,#f3f4f6 0%,#d3d8dd 45%,#bcc3ca 100%);
    padding:calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 14px);
    display:flex;flex-direction:column;gap:12px;
    box-shadow:0 0 40px var(--shadow),inset 0 1px 0 rgba(255,255,255,.7);
  }

  /* LCD */
  .lcd{
    background:linear-gradient(180deg,#d7dccf,#c2cab7);
    border:2px solid var(--lcd-edge);
    border-radius:6px;
    padding:8px 10px 6px;
    box-shadow:inset 0 2px 5px rgba(70,80,60,.4),0 1px 0 rgba(255,255,255,.6);
    color:var(--lcd-ink);
    display:flex;flex-direction:column;
    flex:0 0 auto;min-height:20vh;
  }
  .flags{display:flex;align-items:center;gap:9px;font-size:11px;font-weight:700;min-height:15px;letter-spacing:.5px;font-family:"Courier New",monospace}
  .flags span{visibility:hidden}
  .flags span.on{visibility:visible}
  .histbtn{visibility:visible;background:none;border:none;color:var(--lcd-ink);font-size:16px;line-height:1;cursor:pointer;padding:0 2px;opacity:.85}
  #graphBtn{margin-left:auto}
  #mf{
    flex:1 1 auto;width:100%;min-height:2.2em;
    border:none;background:transparent;color:var(--lcd-ink);
    font-size:24px;overflow:auto;
    --caret-color:#1b1f19;--selection-background-color:#9db08a;--contains-highlight-background-color:transparent;
    --smart-fence-color:#1b1f19;
  }
  #out{
    width:100%;border:none;background:transparent;color:var(--lcd-ink);
    font-size:30px;text-align:right;min-height:1.2em;pointer-events:none;
    display:flex;justify-content:flex-end;
  }
  math-field{outline:none}
  math-field::part(virtual-keyboard-toggle),
  math-field::part(menu-toggle){display:none}

  /* keypad: 6-col scientific area + 5-col number pad (like the real fx-115ES) */
  .pads{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;gap:clamp(4px,1.5vw,10px)}
  .pad{display:grid;grid-auto-rows:1fr;gap:clamp(4px,1.4vw,10px);min-height:0}
  .pad6{grid-template-columns:repeat(6,1fr);flex:5 1 0}
  .pad5{grid-template-columns:repeat(5,1fr);flex:4 1 0}

  /* rectangular nav rocker (replaces round REPLAY disc): full-width 4-way strip */
  .navpad{
    height:100%;width:100%;
    display:grid;grid-template-columns:repeat(4,1fr);
    border-radius:8px;overflow:hidden;
    border:1px solid #2b2f36;
    background:linear-gradient(180deg,#6d747e,#3c414a);
    box-shadow:0 2px 0 rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.18);
    touch-action:none;
  }
  .nav-btn{background:transparent;border:none;color:#eef1f4;font-size:clamp(14px,2.6vh,20px);line-height:1;
    cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;touch-action:none}
  .nav-btn+.nav-btn{border-left:1px solid rgba(0,0,0,.35)}
  .nav-btn:active{background:rgba(255,255,255,.18)}

  button.key{
    position:relative;height:100%;min-height:34px;
    touch-action:none;
    border:1px solid var(--grey-edge);
    background:linear-gradient(180deg,var(--grey),var(--grey2));
    color:var(--func);border-radius:8px;padding:0;
    font-size:clamp(17px,3vh,25px);font-weight:600;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:0 2px 0 rgba(40,44,50,.45),inset 0 1px 0 rgba(255,255,255,.25);
    user-select:none;transition:transform .04s,filter .04s;line-height:1.05;
  }
  button.key:active{transform:translateY(1px);filter:brightness(1.32);box-shadow:0 0 0 rgba(0,0,0,.4)}
  button.key .sh{position:absolute;top:3px;left:4px;font-size:10px;color:var(--shift);font-weight:700;white-space:nowrap;transform:translate(0,0);
    transition:top .16s ease,left .16s ease,transform .16s ease,font-size .16s ease}
  button.key .al{position:absolute;top:2px;right:3px;font-size:10px;color:var(--alpha);font-weight:700}
  button.key .main{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:inherit;pointer-events:none;white-space:nowrap;
    transition:top .16s ease,left .16s ease,transform .16s ease,font-size .16s ease}
  button.key.fn .main{font-size:clamp(15px,2.7vh,22px)}
  button.key.num,button.key.op,button.key.eq{
    background:linear-gradient(180deg,var(--blk),var(--blk2));border-color:var(--blk-edge);
    box-shadow:0 2px 0 rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.12);
  }
  button.key.num .main,button.key.op .main{color:#fff;font-size:clamp(22px,3.9vh,33px)}
  button.key.eq .main{color:#fff;font-size:clamp(24px,4.4vh,36px)}
  /* word labels (SHIFT, CALC, ×10ˣ…) need less than the symbol keys or they overflow */
  button.key.txt .main{font-size:clamp(13px,2.4vh,18px)}
  button.key.danger{
    background:linear-gradient(180deg,var(--red),var(--red2));border-color:var(--red-edge);
    box-shadow:0 2px 0 rgba(60,20,34,.5),inset 0 1px 0 rgba(255,255,255,.18);
  }
  button.key.danger .main,button.key.danger .sh{color:#fdeaf0}
  button.key.shiftkey{background:linear-gradient(180deg,#e0e3e7,#c4cad0);border-color:#aeb5bd}
  button.key.shiftkey .main{color:var(--shift)}
  button.key.alphakey{background:linear-gradient(180deg,#e0e3e7,#c4cad0);border-color:#aeb5bd}
  button.key.alphakey .main{color:var(--alpha)}
  button.key.nav .main{font-size:22px}
  body.shift-on button.key.shiftkey{box-shadow:0 0 0 2px var(--shift),0 2px 0 rgba(40,44,50,.45)}
  body.alpha-on button.key.alphakey{box-shadow:0 0 0 2px var(--alpha),0 2px 0 rgba(40,44,50,.45)}
  /* SHIFT held: labels animate-swap — yellow shift label slides to center & grows,
     white primary slides to upper-left & shrinks. Colors unchanged, only size/position. */
  body.shift-on button.key.hassh .main{
    top:3px;left:4px;transform:translate(0,0);
    font-size:10px;line-height:1;
  }
  body.shift-on button.key.hassh .sh{
    top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:clamp(15px,2.7vh,22px);
  }
  sup{font-size:.7em;vertical-align:super}

  /* history overlay */
  .hist{position:absolute;inset:0;background:rgba(226,230,234,.98);backdrop-filter:blur(2px);
    display:flex;flex-direction:column;z-index:20;
    padding:calc(env(safe-area-inset-top) + 10px) 14px calc(env(safe-area-inset-bottom) + 14px)}
  .hist[hidden]{display:none}
  .hist-head{display:flex;justify-content:space-between;align-items:center;
    padding-bottom:10px;border-bottom:1px solid var(--case-edge);font-weight:700;color:#2a2f36}
  .hist-head>div{display:flex;gap:8px}
  .hist-x{background:linear-gradient(180deg,var(--grey),var(--grey2));border:1px solid var(--grey-edge);color:#fff;
    border-radius:7px;padding:6px 12px;font-size:13px;cursor:pointer}
  .hist-list{flex:1;overflow-y:auto;margin-top:8px;display:flex;flex-direction:column;gap:6px}
  .hist-item{background:#fff;border:1px solid var(--case-edge);border-radius:9px;
    padding:8px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
  .hist-item math-field{pointer-events:none;background:transparent;border:none;--caret-color:transparent}
  .hist-item .he{font-size:15px;color:#5a626c}
  .hist-item .hr{font-size:20px;color:#1b1f25;font-weight:700}
  .hist-empty{color:#8a929c;text-align:center;margin-top:30px;font-size:14px}

  /* graph overlay */
  .graph{position:absolute;inset:0;background:#eef0f2;display:flex;flex-direction:column;z-index:20;
    padding:calc(env(safe-area-inset-top) + 10px) 10px calc(env(safe-area-inset-bottom) + 10px)}
  .graph[hidden]{display:none}
  .graph-head{display:flex;align-items:center;gap:6px;padding-bottom:8px}
  .graph-eq{flex:1;min-width:0;overflow:hidden;display:flex;align-items:center;gap:4px;
    font-weight:700;color:#2a2f36;font-size:16px}
  .graph-eq math-field{pointer-events:none;background:transparent;border:none;font-size:17px;
    --caret-color:transparent;overflow:hidden}
  .graph-btn{background:linear-gradient(180deg,var(--grey),var(--grey2));border:1px solid var(--grey-edge);
    color:#fff;border-radius:7px;width:36px;height:32px;font-size:16px;cursor:pointer;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center}
  .graph-btn:active{filter:brightness(1.3)}
  #gCanvas{flex:1;min-height:0;width:100%;border-radius:8px;border:2px solid var(--lcd-edge);
    background:#f6f8f4;touch-action:none;cursor:grab}
  .graph-hint{text-align:center;font-size:11px;color:#8a929c;padding-top:6px}
  @media (max-width:340px){button.key{font-size:16px}}
</style>
</head>
<body>
  <div class="calc" role="application" aria-label="Scientific calculator">
    <div class="lcd">
      <div class="flags">
        <span id="fShift">S</span>
        <span id="fAlpha">A</span>
        <span id="fM">M</span>
        <span id="fMode" class="on">DEG</span>
        <button id="graphBtn" class="histbtn" aria-label="Graph">&#8767;</button>
        <button id="histBtn" class="histbtn" aria-label="History">&#9719;</button>
      </div>
      <div id="mfWrap"></div>
      <div id="outWrap"></div>
    </div>

    <div class="pads" id="pads">
      <div class="pad pad6" id="pad6"></div>
      <div class="pad pad5" id="pad5"></div>
    </div>

    <div class="hist" id="hist" hidden>
      <div class="hist-head">
        <span>History</span>
        <div>
          <button id="histClear" class="hist-x">Clear</button>
          <button id="histClose" class="hist-x">Close</button>
        </div>
      </div>
      <div class="hist-list" id="histList"></div>
    </div>

    <div class="graph" id="graph" hidden>
      <div class="graph-head">
        <div class="graph-eq"><span>y&nbsp;=</span><math-field read-only id="gEq"></math-field></div>
        <button class="graph-btn" id="gZoomOut" aria-label="Zoom out">&minus;</button>
        <button class="graph-btn" id="gZoomIn" aria-label="Zoom in">+</button>
        <button class="graph-btn" id="gReset" aria-label="Reset view">&#8962;</button>
        <button class="graph-btn" id="gClose" aria-label="Close">&#10005;</button>
      </div>
      <canvas id="gCanvas"></canvas>
      <div class="graph-hint">drag to pan &middot; pinch or scroll to zoom</div>
    </div>
  </div>

<script type="module">
import { MathfieldElement } from "./vendor/mathlive/mathlive.mjs";
import { ComputeEngine } from "./vendor/compute-engine/compute-engine.js";

/* fontsDirectory resolves relative to mathlive.mjs; fonts sit beside it */
MathfieldElement.fontsDirectory = "./fonts";
MathfieldElement.soundsDirectory = null;

const ce = new ComputeEngine();
MathfieldElement.computeEngine = ce;

/* nPr as a native CE function so \operatorname{nPr}(n,r) evaluates */
ce.declare("nPr",{signature:"(number,number)->number",evaluate:(args)=>{
  const n=args[0].re, r=args[1].re;
  if(!isFinite(n)||!isFinite(r)||r<0||r>n) return ce.NaN;
  let p=1;for(let i=0;i<r;i++)p*=(n-i);return ce.number(p);
}});

/* ---------- state ---------- */
const S={shift:false,alpha:false,mode:"DEG",mem:0,sd:"exact",lastExact:null,lastDec:null,lastNum:NaN,hist:[]};
ce.assign("Ans",0);   // Ans is a live symbol; updated after each evaluation
const HKEY="calc-history";
const MODES=["DEG","RAD","GRAD"];
const ANG={DEG:"deg",RAD:"rad",GRAD:"grad"};

/* ---------- input field ---------- */
const mf=new MathfieldElement();
mf.id="mf";
mf.mathVirtualKeyboardPolicy="manual";
mf.smartMode=false;
mf.smartFence=true;
mf.popoverPolicy="off";
mf.placeholderSymbol="▯";
document.getElementById("mfWrap").appendChild(mf);
/* Ans is an atomic macro: cursor can't enter it, serializes as \Ans.
   captureSelection makes it behave as a single solid token.
   MUST run after append — the macros getter throws pre-mount. */
mf.macros={...mf.macros,Ans:{def:"\\mathrm{Ans}",captureSelection:true}};

const out=new MathfieldElement();
out.id="out";
out.readOnly=true;
out.mathVirtualKeyboardPolicy="manual";
document.getElementById("outWrap").appendChild(out);

setTimeout(()=>mf.focus(),0);

/* ---------- key definitions (fx-115ES-ish full layout) ---------- */
// t: 'ins' latex insert | 'cmd' mathfield command | 'act' custom action
const K=(k,main,cls,t,val,sh,shval,al,alval)=>({k,main,cls,t,val,sh,shval,al,alval});
const KEYS=[
  // function block
  K("shift","SHIFT","shiftkey txt","act"),
  K("alpha","ALPHA","alphakey txt","act"),
  K("mode","MODE","fn txt","act"),
  K("calc","CALC","fn txt","act",null,"SOLVE"),
  K("intg","∫dx","fn","act",null,"d/dx"),

  K("left","◀","fn nav","cmd","moveToPreviousChar"),
  K("up","▲","fn nav","cmd","moveUp"),
  K("down","▼","fn nav","cmd","moveDown"),
  K("right","▶","fn nav","cmd","moveToNextChar"),
  K("sd","S⇔D","fn txt","act"),

  K("inv","x⁻¹","fn","ins","^{-1}"),
  K("frac","▯/▯","fn","ins","\\frac{#0}{#0}","▯⌐","\\frac{#0}{#0}"),
  K("sqrt","√▯","fn","ins","\\sqrt{#0}","∛","\\sqrt[3]{#0}"),
  K("sq","x²","fn","ins","^{2}","x³","^{3}"),
  K("pow","x<sup>▯</sup>","fn","ins","^{#?}","ˣ√","\\sqrt[#?]{#?}"),

  K("log","log","fn","ins","\\log_{10}(#0)","10ˣ","10^{#?}"),  // base 10 prefilled, editable; cursor lands in parens
  K("ln","ln","fn","ins","\\ln(#0)","eˣ","e^{#?}"),
  K("lp","(","fn","ins","(","%","\\%"),
  K("rp",")","fn","ins",")",",",",","X","x"),   // ALPHA+) = X, like the real fx-115ES
  K("neg","(−)","fn","ins","-","Abs","\\left|#0\\right|"),

  K("sin","sin","fn","ins","\\sin(#0)","sin⁻¹","\\arcsin(#0)",null),
  K("cos","cos","fn","ins","\\cos(#0)","cos⁻¹","\\arccos(#0)",null),
  K("tan","tan","fn","ins","\\tan(#0)","tan⁻¹","\\arctan(#0)",null),
  K("hyp","hyp","fn","act"),
  K("dms","°′″","fn","act",null,"DRG"),

  K("rcl","RCL","fn txt","act",null,"STO"),
  K("eng","ENG","fn txt","act",null,"i"),       // SHIFT+ENG inserts i
  K("pi","π","fn","ins","\\pi"),
  K("euler","e","fn","ins","e"),
  K("fact","x!","fn","ins","!"),
  K("mplus","M+","fn txt","act",null,"M−"),
  K("on","ON","fn txt","act"),

  // number block
  K("7","7","num","ins","7"),
  K("8","8","num","ins","8"),
  K("9","9","num","ins","9"),
  K("del","DEL","danger","act"),
  K("ac","AC","danger","act"),

  K("4","4","num","ins","4"),
  K("5","5","num","ins","5"),
  K("6","6","num","ins","6"),
  K("mul","×","op","ins","\\times","nCr","\\binom{#0}{#0}"),
  K("div","÷","op","ins","\\div","nPr","\\operatorname{nPr}(#0,#0)"),

  K("1","1","num","ins","1"),
  K("2","2","num","ins","2"),
  K("3","3","num","ins","3"),
  K("add","+","op","ins","+","Pol",null),
  K("sub","−","op","ins","-","Rec",null),

  K("0","0","num","ins","0"),
  K("dot",".","num","ins",".","Ran#",null),
  K("exp","×10ˣ","num txt","ins","\\times10^{#?}"),
  K("ans","Ans","num","act"),
  K("eq","=","eq","act"),
];

/* ---------- build keypad ---------- */
const KMAP=Object.fromEntries(KEYS.map(d=>[d.k,d]));
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// fx-115ES layout. 6-col scientific area (round REPLAY disc spans 2 cols), 5-col number pad.
// Mirrors the fx-115ES PLUS function block. DISC moved to the top row (real device
// spans REPLAY over rows 1-2 middle); its freed slots hold π/e/x! which the real
// device puts on SHIFT/ALPHA. Rows below match the hardware left-to-right:
const GRID6=[
  "shift","alpha","DISC","mode","on",            // DISC spans 2 -> 6 cols
  "calc","intg","pi","euler","inv","fact",       // real row: CALC ∫dx [replay] x⁻¹ (x! = shift x⁻¹)
  "frac","sqrt","sq","pow","log","ln",           // real row: ▢/▢ √ x² x^ log ln
  "neg","dms","hyp","sin","cos","tan",           // real row: (−) °′″ hyp sin cos tan
  "rcl","eng","lp","rp","sd","mplus",            // real row: RCL ENG ( ) S⇔D M+
];
const GRID5=[
  "7","8","9","del","ac",
  "4","5","6","mul","div",
  "1","2","3","add","sub",
  "0","dot","exp","ans","eq",
];
function keyHTML(d){
  const sh=d.sh?`<span class="sh">${esc(d.sh)}</span>`:"";
  const al=d.al?`<span class="al">${esc(d.al)}</span>`:"";
  // main labels are internal constants; may contain markup like <sup>
  return `<button class="key ${d.cls}${d.sh?" hassh":""}" data-k="${d.k}">${sh}${al}<span class="main">${d.main}</span></button>`;
}
const DISC=`<div class="navpad" style="grid-column:span 2">
  <button class="nav-btn" data-k="left" aria-label="Left">&#9664;</button>
  <button class="nav-btn" data-k="up" aria-label="Up">&#9650;</button>
  <button class="nav-btn" data-k="down" aria-label="Down">&#9660;</button>
  <button class="nav-btn" data-k="right" aria-label="Right">&#9654;</button>
</div>`;
document.getElementById("pad6").innerHTML=GRID6.map(k=>k==="DISC"?DISC:keyHTML(KMAP[k])).join("");
document.getElementById("pad5").innerHTML=GRID5.map(k=>keyHTML(KMAP[k])).join("");

/* Act on pointerdown (fires instantly, once per tap) so rapid taps like 6-then-8
   aren't merged/dropped as double-tap gestures the way delayed click events are.
   preventDefault keeps focus in the math-field and suppresses the synthetic click. */
const pads=document.getElementById("pads");
pads.addEventListener("pointerdown",e=>{
  const btn=e.target.closest("button[data-k]");if(!btn)return;
  e.preventDefault();
  press(KMAP[btn.dataset.k]);
  if(navigator.vibrate)navigator.vibrate(6);
});
/* keyboard/accessibility: still handle click for non-pointer activation */
pads.addEventListener("click",e=>{
  if(e.detail===0){const btn=e.target.closest("button[data-k]");if(btn)press(KMAP[btn.dataset.k]);}
});

function press(d){
  if(!d)return;
  const shifted=S.shift,alphaed=S.alpha;
  // modifier toggles
  if(d.k==="shift"){S.shift=!S.shift;S.alpha=false;flags();return;}
  if(d.k==="alpha"){S.alpha=!S.alpha;S.shift=false;flags();return;}

  if(d.t==="ins"){
    if(shifted&&d.k==="dot"){                        // Ran#
      mf.insert(String(Math.floor(Math.random()*1000)/1000),{focus:true});
    }else{
      const latex=(shifted&&d.shval)?d.shval:(alphaed&&d.alval)?d.alval:d.val;
      if(latex!=null)mf.insert(latex,{selectionMode:"placeholder",focus:true});
    }
  }else if(d.t==="cmd"){
    mf.executeCommand(d.val);
  }else if(d.t==="act"){
    action(d.k,shifted);
  }
  S.shift=false;S.alpha=false;flags();
  mf.focus();
}

function action(k,shifted){
  switch(k){
    case"mode":S.mode=MODES[(MODES.indexOf(S.mode)+1)%3];break;
    case"sd":S.sd=S.sd==="exact"?"decimal":"exact";showResult();break;
    case"del":mf.executeCommand("deleteBackward");break;
    case"ac":mf.setValue("");out.setValue("");S.lastExact=S.lastDec=null;break;
    case"eq":evaluate();break;
    case"ans":mf.insert("\\Ans",{focus:true});break;
    case"mplus":memAdd(shifted?-1:1);break;
    case"rcl":if(shifted){/* STO stub */}else if(S.mem)mf.insert(String(S.mem),{focus:true});break;
    case"eng":shifted?mf.insert("\\imaginaryI",{focus:true}):engResult();break;   // SHIFT+ENG = i
    case"on":mf.focus();break;
    // stubs (future): calc, intg, hyp, dms
    default:break;
  }
}

/* ---------- evaluate ---------- */
/* \Ans is a MathLive macro CE doesn't know; expand to \mathrm{Ans} (symbol Ans) for parsing */
const ceLatex=s=>s.replace(/\\Ans(?![A-Za-z])/g,"\\mathrm{Ans}");
function evaluate(){
  const latex=ceLatex(mf.getValue("latex"));
  if(!latex||/\\placeholder/.test(latex)){return;}
  try{
    ce.angularUnit=ANG[S.mode];
    const expr=ce.parse(latex);
    const dec=expr.N();
    const ex=expr.evaluate();
    const re=typeof dec.re==="number"?dec.re:NaN;
    const im=typeof dec.im==="number"?dec.im:0;
    const bad=dec.isNaN||(!isFinite(re)&&!(im&&isFinite(im)))||(im&&!isFinite(im));
    if(bad){out.setValue("\\text{Math ERROR}");return;}
    ce.assign("Ans",ex);
    if(im!==0){
      // exact: reduce CE's raw radicals (sqrt(-12) -> 2√3 i); decimal: a+bi
      S.lastExact=reduceRadicals(ex.latex);
      S.lastDec=cplxLatex(re,im);
      S.lastNum=NaN;
    }else{
      S.lastExact=reduceRadicals(ex.latex);S.lastDec=fmtNum(re);S.lastNum=re;
    }
    S.sd="exact";           // each new result shows exact by default (S⇔D toggles it)
    showResult();
    pushHistory(latex,S.sd==="exact"?S.lastExact:S.lastDec);
  }catch(err){
    out.setValue("\\text{Syntax ERROR}");
  }
}
function numOf(v){try{return typeof v.re==="number"?v.re:Number(v.valueOf());}catch(e){return NaN;}}
/* reduce √(integer): factor out largest perfect square. 12 -> 2√3, 4 -> 2, 2 -> √2 */
function reduceSurd(n){let coef=1,rad=n;for(let f=2;f*f<=rad;f++){while(rad%(f*f)===0){rad/=f*f;coef*=f;}}return{coef,rad};}
/* rewrite \sqrt{±integer} in a LaTeX string to reduced surd form (imaginary for negatives) */
function reduceRadicals(s){
  return String(s).replace(/\\sqrt\{(-?\d+)\}/g,(_,g)=>{
    let n=parseInt(g,10);const neg=n<0;n=Math.abs(n);
    const {coef,rad}=reduceSurd(n);
    if(!neg) return rad===1?String(coef):(coef>1?coef:"")+"\\sqrt{"+rad+"}";
    if(rad===1) return (coef===1?"":coef)+"\\imaginaryI";
    return (coef>1?coef:"")+"\\sqrt{"+rad+"}\\imaginaryI";
  });
}
/* round to 10 significant figures (Casio-style) */
function round10(x){return parseFloat(x.toPrecision(10));}
function fmtNum(x){return String(round10(x));}
/* a+bi as LaTeX, reduced (drop 1 coefficients, sign handling) */
function cplxLatex(re,im){
  re=round10(re);im=round10(im);
  const mag=Math.abs(im), imag=(mag===1?"":String(mag))+"\\imaginaryI";
  if(im===0)return String(re);
  if(re===0)return (im<0?"-":"")+imag;
  return String(re)+(im<0?"-":"+")+imag;
}
/* engineering notation: mantissa × 10^(3k) */
function engResult(){
  const x=S.lastNum;
  if(!isFinite(x)){return;}
  if(x===0){out.setValue("0");return;}
  let exp=Math.floor(Math.log10(Math.abs(x)));
  exp=exp-((exp%3)+3)%3;
  const mant=x/Math.pow(10,exp);
  const m=parseFloat(mant.toPrecision(10)).toString();
  out.setValue(exp===0?m:`${m}\\times10^{${exp}}`);
  S.sd="decimal";
}
function showResult(){
  const v=S.sd==="exact"?S.lastExact:S.lastDec;
  if(v!=null)out.setValue(v);
}
function memAdd(sign){
  const latex=ceLatex(mf.getValue("latex"));
  try{const v=numOf(ce.parse(latex).N());if(isFinite(v)){S.mem+=sign*v;flags();}}catch(e){}
}

/* ---------- flags ---------- */
function flags(){
  document.getElementById("fShift").classList.toggle("on",S.shift);
  document.getElementById("fAlpha").classList.toggle("on",S.alpha);
  document.getElementById("fM").classList.toggle("on",S.mem!==0);
  document.getElementById("fMode").textContent=S.mode;
  document.body.classList.toggle("shift-on",S.shift);
  document.body.classList.toggle("alpha-on",S.alpha);
}

/* ---------- history (localStorage) ---------- */
const histEl=document.getElementById("hist");
const histList=document.getElementById("histList");
function loadHistory(){try{S.hist=JSON.parse(localStorage.getItem(HKEY))||[];}catch(e){S.hist=[];}}
function saveHistory(){try{localStorage.setItem(HKEY,JSON.stringify(S.hist.slice(0,50)));}catch(e){}}
function pushHistory(e,r){S.hist.unshift({e,r});if(S.hist.length>50)S.hist.length=50;saveHistory();}
function renderHistory(){
  if(!S.hist.length){histList.innerHTML='<div class="hist-empty">No calculations yet</div>';return;}
  histList.innerHTML=S.hist.map((h,i)=>
    `<div class="hist-item" data-i="${i}"><div class="he"><math-field read-only>${esc(h.e)}=</math-field></div><div class="hr"><math-field read-only>${esc(h.r)}</math-field></div></div>`
  ).join("");
}
document.getElementById("histBtn").addEventListener("click",()=>{renderHistory();histEl.hidden=false;});
document.getElementById("histClose").addEventListener("click",()=>histEl.hidden=true);
document.getElementById("histClear").addEventListener("click",()=>{S.hist=[];saveHistory();renderHistory();});
histList.addEventListener("click",e=>{
  const it=e.target.closest(".hist-item");if(!it)return;
  const h=S.hist[+it.dataset.i];if(!h)return;
  // history stores \mathrm{Ans} (renders in plain math-fields); restore atomic \Ans for editing
  mf.setValue(h.e.replace(/\\mathrm\{Ans\}/g,"\\Ans"));histEl.hidden=true;mf.focus();
});

/* ---------- graph ---------- */
const gEl=document.getElementById("graph"),gCv=document.getElementById("gCanvas"),
      gEq=document.getElementById("gEq"),gCtx=gCv.getContext("2d");
const G={f:null,slow:false,x0:-10,x1:10,y0:-10,y1:10,open:false};

/* build y=f(x) evaluator: compiled JS when possible, boxed-eval fallback.
   compile() is radians-only in some CE builds — probe sin under the current
   angle mode and fall back to (slower) boxed evaluation if they disagree. */
function makeFn(latex){
  ce.angularUnit=ANG[S.mode];
  const expr=ce.parse(latex);
  let fn=null;
  try{fn=expr.compile();}catch(e){}
  if(fn&&S.mode!=="RAD"&&/\\(arc)?(sin|cos|tan)/.test(latex)){
    try{
      const probe=ce.parse("\\sin(30)");
      if(Math.abs(probe.N().re-probe.compile()({}))>1e-9)fn=null;
    }catch(e){fn=null;}
  }
  G.slow=!fn;
  if(fn)return x=>{try{const v=fn({x});return typeof v==="number"?v:NaN;}catch(e){return NaN;}};
  return x=>{try{return numOf(expr.subs({x:ce.number(x)}).N());}catch(e){return NaN;}};
}

function autoFitY(){
  const n=240,vals=[];
  for(let i=0;i<=n;i++){
    const v=G.f(G.x0+(G.x1-G.x0)*i/n);
    if(isFinite(v))vals.push(v);
  }
  if(!vals.length){G.y0=-10;G.y1=10;return;}
  vals.sort((a,b)=>a-b);
  // 5th–95th percentile so one asymptote (tan) doesn't blow up the scale
  let lo=vals[Math.floor(vals.length*.05)],hi=vals[Math.ceil(vals.length*.95)-1];
  if(!isFinite(lo)||!isFinite(hi)){G.y0=-10;G.y1=10;return;}
  if(hi-lo<1e-9){lo-=1;hi+=1;}
  const pad=(hi-lo)*.15;
  G.y0=lo-pad;G.y1=hi+pad;
}

function openGraph(){
  const latex=ceLatex(mf.getValue("latex"));
  if(!latex||/\\placeholder/.test(latex)){out.setValue("\\text{Nothing to graph}");return;}
  try{G.f=makeFn(latex);}catch(e){out.setValue("\\text{Syntax ERROR}");return;}
  gEq.setValue(latex);
  G.x0=-10;G.x1=10;autoFitY();
  gEl.hidden=false;G.open=true;
  sizeCanvas();drawGraph();
}
function closeGraph(){gEl.hidden=true;G.open=false;gPtrs.clear();mf.focus();}

function sizeCanvas(){
  const r=gCv.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  gCv.width=Math.round(r.width*dpr);gCv.height=Math.round(r.height*dpr);
  gCtx.setTransform(dpr,0,0,dpr,0,0);
}

/* nice tick step: 1/2/5 × 10^n giving ~one gridline per `px` pixels */
function niceStep(range,pixels,px=64){
  const raw=range/Math.max(1,pixels/px),p=Math.pow(10,Math.floor(Math.log10(raw))),r=raw/p;
  return (r<1.5?1:r<3.5?2:r<7.5?5:10)*p;
}
function fmtTick(v,step){
  if(Math.abs(v)<1e-12)v=0;
  if(Math.abs(v)>=1e6||(v!==0&&Math.abs(v)<1e-4))return v.toExponential(1);
  const d=Math.max(0,-Math.floor(Math.log10(step)));
  return String(parseFloat(v.toFixed(Math.min(10,d+1))));
}

function drawGraph(){
  const W=gCv.width/(window.devicePixelRatio||1),H=gCv.height/(window.devicePixelRatio||1);
  if(W<10||H<10)return;
  const X=x=>(x-G.x0)/(G.x1-G.x0)*W, Y=y=>H-(y-G.y0)/(G.y1-G.y0)*H;
  gCtx.clearRect(0,0,W,H);
  gCtx.fillStyle="#f6f8f4";gCtx.fillRect(0,0,W,H);

  // grid + labels
  const sx=niceStep(G.x1-G.x0,W),sy=niceStep(G.y1-G.y0,H);
  gCtx.font="11px -apple-system,sans-serif";gCtx.fillStyle="#7c857a";
  gCtx.strokeStyle="#d8ddd2";gCtx.lineWidth=1;
  const axY=Math.min(Math.max(Y(0),12),H-6);   // label row (clamped to view)
  const axX=Math.min(Math.max(X(0),4),W-34);
  for(let x=Math.ceil(G.x0/sx)*sx;x<=G.x1;x+=sx){
    const px=X(x);
    gCtx.beginPath();gCtx.moveTo(px,0);gCtx.lineTo(px,H);gCtx.stroke();
    if(Math.abs(x)>1e-12)gCtx.fillText(fmtTick(x,sx),px+2,axY-3);
  }
  for(let y=Math.ceil(G.y0/sy)*sy;y<=G.y1;y+=sy){
    const py=Y(y);
    gCtx.beginPath();gCtx.moveTo(0,py);gCtx.lineTo(W,py);gCtx.stroke();
    if(Math.abs(y)>1e-12)gCtx.fillText(fmtTick(y,sy),axX+4,py-3);
  }
  // axes
  gCtx.strokeStyle="#69715f";gCtx.lineWidth=1.5;
  if(G.y0<0&&G.y1>0){gCtx.beginPath();gCtx.moveTo(0,Y(0));gCtx.lineTo(W,Y(0));gCtx.stroke();}
  if(G.x0<0&&G.x1>0){gCtx.beginPath();gCtx.moveTo(X(0),0);gCtx.lineTo(X(0),H);gCtx.stroke();}

  // curve
  if(!G.f)return;
  const n=G.slow?120:Math.ceil(W);           // ponytail: boxed eval is slow, coarser sampling
  const jump=(G.y1-G.y0)*4;
  gCtx.strokeStyle="#8f3b52";gCtx.lineWidth=2;gCtx.lineJoin="round";
  gCtx.beginPath();
  let pen=false,prev=NaN;
  for(let i=0;i<=n;i++){
    const x=G.x0+(G.x1-G.x0)*i/n,y=G.f(x);
    if(!isFinite(y)||(pen&&Math.abs(y-prev)>jump)){pen=false;prev=y;continue;}
    const px=X(x),py=Math.max(-H,Math.min(2*H,Y(y)));
    pen?gCtx.lineTo(px,py):gCtx.moveTo(px,py);
    pen=true;prev=y;
  }
  gCtx.stroke();
}

/* zoom keeping data point (cx,cy) fixed on screen */
function zoomAt(cx,cy,k){
  G.x0=cx-(cx-G.x0)*k;G.x1=cx+(G.x1-cx)*k;
  G.y0=cy-(cy-G.y0)*k;G.y1=cy+(G.y1-cy)*k;
  drawGraph();
}
const gDataX=px=>G.x0+px/gCv.getBoundingClientRect().width*(G.x1-G.x0);
const gDataY=py=>{const h=gCv.getBoundingClientRect().height;return G.y0+(h-py)/h*(G.y1-G.y0);};

/* gestures: 1 pointer = pan, 2 = pinch zoom, wheel = zoom at cursor */
const gPtrs=new Map();
gCv.addEventListener("pointerdown",e=>{
  gCv.setPointerCapture(e.pointerId);
  gPtrs.set(e.pointerId,{x:e.offsetX,y:e.offsetY});
});
gCv.addEventListener("pointermove",e=>{
  if(!gPtrs.has(e.pointerId))return;
  const p=gPtrs.get(e.pointerId);
  if(gPtrs.size===1){
    const r=gCv.getBoundingClientRect();
    const dx=(e.offsetX-p.x)/r.width*(G.x1-G.x0),dy=(e.offsetY-p.y)/r.height*(G.y1-G.y0);
    G.x0-=dx;G.x1-=dx;G.y0+=dy;G.y1+=dy;
    p.x=e.offsetX;p.y=e.offsetY;
    drawGraph();
  }else if(gPtrs.size===2){
    const pts=[...gPtrs.values()];
    const d0=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
    p.x=e.offsetX;p.y=e.offsetY;
    const d1=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
    if(d0>0&&d1>0){
      const mx=(pts[0].x+pts[1].x)/2,my=(pts[0].y+pts[1].y)/2;
      zoomAt(gDataX(mx),gDataY(my),d0/d1);
    }
  }
});
const gPtrEnd=e=>gPtrs.delete(e.pointerId);
gCv.addEventListener("pointerup",gPtrEnd);
gCv.addEventListener("pointercancel",gPtrEnd);
gCv.addEventListener("wheel",e=>{
  e.preventDefault();
  zoomAt(gDataX(e.offsetX),gDataY(e.offsetY),Math.exp(e.deltaY*0.0015));
},{passive:false});

document.getElementById("graphBtn").addEventListener("click",openGraph);
document.getElementById("gClose").addEventListener("click",closeGraph);
document.getElementById("gZoomIn").addEventListener("click",()=>zoomAt((G.x0+G.x1)/2,(G.y0+G.y1)/2,1/1.5));
document.getElementById("gZoomOut").addEventListener("click",()=>zoomAt((G.x0+G.x1)/2,(G.y0+G.y1)/2,1.5));
document.getElementById("gReset").addEventListener("click",()=>{G.x0=-10;G.x1=10;autoFitY();drawGraph();});
window.addEventListener("resize",()=>{if(G.open){sizeCanvas();drawGraph();}});
window.addEventListener("keydown",e=>{if(e.key==="Escape"&&G.open)closeGraph();});

/* ---------- physical keyboard passthrough (let MathLive handle) ---------- */
window.addEventListener("keydown",e=>{
  if(e.key==="Enter"||e.key==="="){e.preventDefault();evaluate();}
});

/* ---------- PWA ---------- */
if("serviceWorker"in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}

/* ---------- init ---------- */
loadHistory();
flags();

/* ---------- self-check (silent unless fail) ---------- */
(function selfTest(){
  const near=(a,b)=>Math.abs(a-b)<1e-9;
  let ok=true;
  ce.angularUnit="deg";
  const cases=[["\\frac{1}{2}+\\frac{1}{3}",5/6],["\\sqrt{9}",3],["2^{10}",1024],["\\sin(30)",0.5],
    ["\\binom{5}{2}",10],["\\operatorname{nPr}(5,2)",20],["\\left|3+4i\\right|",5],["50\\%",0.5],
    ["\\log_{10}(1000)",3],["\\log_{2}(8)",3]];
  for(const[tex,exp]of cases){
    try{const v=numOf(ce.parse(tex).N());if(!near(v,exp)){console.error("FAIL",tex,v,"!=",exp);ok=false;}}
    catch(err){console.error("ERR",tex,err.message);ok=false;}
  }
  // Ans as live symbol (via \Ans macro -> ceLatex expansion)
  try{
    ce.assign("Ans",9);
    if(!near(numOf(ce.parse(ceLatex("\\Ans+1")).N()),10)){console.error("FAIL Ans+1");ok=false;}
    if(!near(numOf(ce.parse(ceLatex("\\sqrt{\\Ans}")).N()),3)){console.error("FAIL sqrt(Ans)");ok=false;}
    ce.assign("Ans",0);
  }catch(err){console.error("ERR Ans",err.message);ok=false;}
  // complex: (2+3i)(1-i) = 5+i
  try{const z=ce.parse("(2+3i)(1-i)").N();if(!near(z.re,5)||!near(z.im,1)){console.error("FAIL complex",z.latex);ok=false;}}
  catch(err){console.error("ERR complex",err.message);ok=false;}
  // surd reduction
  const surds={"\\sqrt{-12}":"2\\sqrt{3}\\imaginaryI","\\sqrt{-4}":"2\\imaginaryI","\\sqrt{-2}":"\\sqrt{2}\\imaginaryI","\\sqrt{12}":"2\\sqrt{3}","\\sqrt{-1}":"\\imaginaryI"};
  for(const[k,v]of Object.entries(surds)){if(reduceRadicals(k)!==v){console.error("FAIL surd",k,"->",reduceRadicals(k),"exp",v);ok=false;}}
  console.log(ok?"calc self-test: PASS":"calc self-test: FAIL");
})();
</script>
</body>
